<!doctype html>
<html>
  <head>
    <title>RitualIA</title>
    <meta charset="UTF-8" />
    <link rel="icon" href="/pages/favicon.ico" />
    <link rel="stylesheet" href="/pages/home/css/globals.css" />
    <link rel="stylesheet" href="/pages/home/css/home.css" />
    <link rel="stylesheet" href="/pages/home/css/player.css" />
  </head>

  <body>
    <img src="/pages/assets/logo.png" class="logo-bg" />
    
    <div id="home" style="visibility: visible;">
      <div class="main">
        <h2>GÊNEROS MUSICAIS</h2>

        <div class="carousel">

          <div class="track-wrapper">
            <div class="track" id="cylinder"></div>
          </div>

          <div class="player" id="playerText">Baião</div>

          <div class="slider-container">
            <input type="range" min="0" max="11" value="0" id="slider" />
          </div>
        </div>
      </div>

      <!-- ✅ PAINEL ORIGINAL RESTAURADO -->
      <div class="painel" id="painel">
        <div class="voltar" onclick="voltar()">⬅ VOLTAR</div>
        <h1>RITMOS MUSICAIS</h1>

        <img id="painelImg" />

        <div>
          <div class="seta" onclick="mudarSentimento(-1)">▲</div>
          <div class="drum-wrapper">
            <div class="drum-cylinder" id="drumCylinder"></div>
          </div>
          <div class="seta" onclick="mudarSentimento(1)">▼</div>
          <button id="submit__btn">Selecionar</button>
        </div>
      </div>
    </div>

    <div id="player" style="visibility: hidden;">
      <div class="wrapper">
        <div class="row-player">
          <!-- ABA -->
          <div class="panel" id="panel">
            <div class="panel-content">
              História detalhada do autor, com imagens antigas e recentes.
            </div>
          </div>

          <div class="arrow">➜</div>

          <!-- PLAYER -->
          <div class="player-box" id="playerBox">
            <div id="ytplayer"></div>

            <div class="info">
              <div id="author">Autor</div>
              <div id="music">Música</div>
            </div>

            <div class="time">
              <div id="current">0:00</div>
              <div id="duration">0:00</div>
            </div>

            <div class="progress">
              <div class="bar" id="bar"></div>
              <div class="dot" id="dot"></div>
            </div>
          </div>
        </div>

        <!-- FILA -->
        <div class="queue" id="queue">
          <div class="queue-header">
            <div>
              <div class="queue-title">fila de espera</div>
              <div class="queue-sub">Músicas</div>
            </div>

            <div class="queue-arrow" id="queue-arrow">▼</div>
          </div>

          <div class="queue-list" id="queue-list"><div class="queue-item"></div></div>
        </div>
      </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="pages/globals.js"></script>
    <script type="module" src="pages/home/js/youtube-frame-controls.js"></script>
    <script type="module" src="pages/home/js/async-queue.js"></script>
    <script type="module" src="pages/home/js/script.js"></script>
    <script type="module" src="pages/home/js/player.js"></script>
    <script type="module" src="pages/home/js/home.js"></script>
    <script type="module">
      import { submitData } from "./pages/home/js/home.js";
      import { playerControls } from "./pages/home/js/script.js";
      const submitBtn = document.getElementById("submit__btn");
      const queueArrow = document.getElementById("queue-arrow");
      const panel = document.getElementById("panel");

      submitBtn.addEventListener("click", () => {
        submitData()
      });

      queueArrow.addEventListener("click", () => {
        playerControls.toggleQueue();
      });
      panel.addEventListener("click", () => {
        playerControls.togglePanel();
      });
    </script>
  </body>
</html>
