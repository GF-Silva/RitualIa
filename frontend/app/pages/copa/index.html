<!doctype html>
<html>
  <head>
    <title>RitualIA</title>
    <meta charset="UTF-8" />
    <link rel="icon" href="/pages/favicon.ico" />
    <link rel="stylesheet" href="/pages/globals.css" />
    <link rel="stylesheet" href="/pages/copa/styles.css" />
  </head>

  <body>
    <img src="/pages/assets/logo.png" class="logo-bg" id="logo"/>
    
    <div class="main">
      <h2>Seleções</h2>

      <div class="carousel">

        <div class="track-wrapper">
          <div class="track" id="cylinder"></div>
        </div>

        <div class="player" id="playerText"></div>

        <div class="slider-container">
          <input type="range" min="0" max="11" value="0" id="slider" />
        </div>
      </div>
    </div>

    <div id="player">
        <!-- PLAYER -->
        <div class="player-box" id="playerBox">
          <div id="ytplayer"></div>

          <div class="time">
            <div id="current">0:00</div>
            <div id="duration">0:00</div>
          </div>

          <div class="progress">
            <div class="bar" id="bar"></div>
            <div class="dot" id="dot"></div>
          </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="pages/config.js"></script>
    <script type="module" src="pages/copa/script.js"></script>
    <script type="module" src="pages/home/js/player.js"></script>
  </body>
  </html>
