<!doctype html>
<html>
  <head>
    <title>RitualIA</title>
    <meta charset="UTF-8" />
    <link rel="icon" href="/pages/assets/favicon.ico" />
    <link rel="stylesheet" href="/pages/globals.css" />
    <link rel="stylesheet" href="/pages/copa/styles.css" />
  </head>

  <body>
    <img src="/pages/assets/logo.png" class="logo-bg" id="logo" />

    <div class="main">
      <h1>Seleções</h1>
      
      <div class="cover-flow">
        <div id="cylinder"></div>
      </div>
    </div>

    <div id="player">
      <!-- PLAYER -->
      <div class="player-box" id="playerBox">
        <div id="ytplayer"></div>

        <div class="time">
          <div id="current">0:00</div>
          <div id="duration">0:00</div>
        </div>

        <div class="progress">
          <div class="bar" id="bar"></div>
          <div class="dot" id="dot"></div>
        </div>
      </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="pages/copa/script.js"></script>
    <script src="pages/config.js"></script>
  </body>
</html>
